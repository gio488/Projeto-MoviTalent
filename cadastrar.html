<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RENOVA · Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="decor-bg"><div class="circle circle-1"></div><div class="circle circle-3"></div></div>

<nav class="navbar nav-glass sticky-top py-3">
  <div class="container">
    <a href="index.html" class="logo">
  <img src="5634fd87-8ef3-48b1-8a99-34bec4a15fba-removebg-preview.png" alt="RENOVA Logo" class="logo-img" style="height: 55px;">
  <div>
    <div class="logo-text">RENOVA</div>
    <div class="logo-sub">Coleção & Reutilização Sustentável</div>
  </div>
</a>
  </div>
</nav>

<main class="container my-5 py-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card-glass p-4 p-md-5">
        <div class="text-center mb-4">
          <i class="bi bi-person-plus" style="font-size: 45px; color: var(--green-renova);"></i>
          <h2 class="fw-bold mt-2">Criar conta <span style="color: var(--terracota);">RENOVA</span></h2>
          <p class="text-muted">Junte-se à comunidade sustentável</p>
        </div>
        <form id="registerForm">
          <div class="mb-3"><input type="text" id="regName" class="form-control form-control-custom" placeholder="Nome completo" required></div>
          <div class="mb-3"><input type="email" id="regEmail" class="form-control form-control-custom" placeholder="E-mail" required></div>
          <div class="mb-3"><input type="password" id="regPassword" class="form-control form-control-custom" placeholder="Senha (mínimo 4)" required></div>
          <div class="mb-3"><input type="text" id="regCity" class="form-control form-control-custom" placeholder="Sua cidade" required></div>
          <div class="mb-4"><input type="tel" id="regPhone" class="form-control form-control-custom" placeholder="Telefone (opcional)"></div>
          <button type="submit" class="btn btn-primary-renova w-100 py-3"><i class="bi bi-check-lg me-2"></i>Cadastrar e começar</button>
        </form>
        <p class="text-center mt-4">Já tem conta? <a href="detalhes.html" style="color: var(--terracota); font-weight: 600;">Fazer login →</a></p>
      </div>
    </div>
  </div>
</main>

<footer class="footer-renova">
  <div class="container text-center"><p class="small mb-0">🌱 Cada nova conta é um passo para um mundo mais sustentável</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
  document.getElementById('registerForm')?.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const pwd = document.getElementById('regPassword').value;
    const city = document.getElementById('regCity').value;
    const phone = document.getElementById('regPhone').value;
    if (handleRegister(name, email, pwd, city, phone)) window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
