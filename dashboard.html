<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RENOVA · Itens disponíveis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="decor-bg"><div class="circle circle-1"></div><div class="circle circle-2"></div></div>

<nav class="navbar nav-glass sticky-top py-2">
  <div class="container">
   <a href="dashboard.html" class="logo">
  <img src="5634fd87-8ef3-48b1-8a99-34bec4a15fba-removebg-preview.png" alt="RENOVA Logo" class="logo-img" style="height: 55px;">
  <div>
    <div class="logo-text">RENOVA</div>
    <div class="logo-sub">Coleção & Reutilização Sustentável</div>
  </div>
</a>
    <div class="ms-auto d-flex gap-2" id="navUserArea"></div>
  </div>
</nav>

<main class="container my-4">
  <div id="dashboardContent"></div>
</main>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
  <div id="liveToast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex"><div class="toast-body" id="toastMessage"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
  </div>
</div>

<footer class="footer-renova">
  <div class="container text-center"><p class="small mb-0">♻️ Encontre o que precisa ou doe o que não usa mais - RENOVA</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
  if (!checkAuthAndRedirect()) null;
  updateNavbarUI();
  renderDashboardUI();
  
  function renderDashboardUI() {
    const items = getAllItems();
    const categories = [...new Set(items.map(i => i.category))];
    document.getElementById('dashboardContent').innerHTML = `
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
        <h2 class="fw-bold"><i class="bi bi-search-heart me-2" style="color: var(--terracota);"></i>Itens disponíveis para reutilizar</h2>
        <div class="d-flex gap-2 mt-2 mt-sm-0">
          <select id="categoryFilter" class="form-select w-auto"><option value="">Todas categorias</option>${categories.map(c => `<option value="${c}">${c}</option>`).join('')}</select>
          <input type="text" id="searchFilter" class="form-control" placeholder="Buscar..." style="width: 200px;">
        </div>
      </div>
      <div class="row g-4" id="itemsGrid">
        ${items.map(item => `
          <div class="col-md-6 col-lg-4">
            <div class="item-card p-0" onclick="viewItemDetail(${item.id})">
              <div class="item-img-placeholder">${item.images[0]}</div>
              <div class="p-3">
                <div class="d-flex justify-content-between"><span class="category-badge">${item.category}</span><small class="text-muted"><i class="bi bi-clock"></i> ${item.duration} dias</small></div>
                <h5 class="mt-2 fw-bold">${item.title}</h5>
                <p class="small text-muted">${item.quantity} • ${item.city}</p>
                <div class="d-flex justify-content-between mt-2"><span><i class="bi bi-chat-dots"></i> ${item.bids.length} lances</span><span class="badge" style="background: var(--terracota);">Ver →</span></div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('categoryFilter')?.addEventListener('change', filterItems);
    document.getElementById('searchFilter')?.addEventListener('keyup', filterItems);
  }
  
  function filterItems() {
    const category = document.getElementById('categoryFilter')?.value || '';
    const search = document.getElementById('searchFilter')?.value.toLowerCase() || '';
    const items = getAllItems();
    const filtered = items.filter(i => (!category || i.category === category) && (!search || i.title.toLowerCase().includes(search) || i.description.toLowerCase().includes(search)));
    const grid = document.getElementById('itemsGrid');
    if (grid) grid.innerHTML = filtered.map(item => `
      <div class="col-md-6 col-lg-4"><div class="item-card p-0" onclick="viewItemDetail(${item.id})"><div class="item-img-placeholder">${item.images[0]}</div><div class="p-3"><div class="d-flex justify-content-between"><span class="category-badge">${item.category}</span><small><i class="bi bi-clock"></i> ${item.duration} dias</small></div><h5 class="mt-2 fw-bold">${item.title}</h5><p class="small text-muted">${item.quantity} • ${item.city}</p><div><span>${item.bids.length} lances</span></div></div></div></div>
    `).join('') || '<div class="col-12 text-center py-5"><i class="bi bi-emoji-frown" style="font-size: 48px;"></i><p class="mt-3">Nenhum item encontrado</p></div>';
  }
  
  window.viewItemDetail = (id) => window.location.href = `detalhe-item.html?id=${id}`;
</script>
</body>
</html>
