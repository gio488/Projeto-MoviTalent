<div class="card-glass p-3 mb-4">
  <h5><i class="bi bi-bell"></i> Alertas de novos itens</h5>
  <p class="small">Receba notificações quando aparecerem itens do seu interesse</p>
  <div class="d-flex gap-2 flex-wrap">
    <select id="notifCategoria" class="form-select w-auto">
      <option value="">Todas</option>
      <option>Materiais de Construção</option>
      <option>Móveis</option>
      <option>Eletrônicos</option>
    </select>
    <input type="text" id="notifCidade" placeholder="Sua cidade" class="form-control w-auto">
    <button onclick="assinarNotificacao()" class="btn btn-primary-renova">Ativar alerta</button>
  </div>
  <div id="alertasAtivos" class="mt-2 small text-muted"></div>
</div>
